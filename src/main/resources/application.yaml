server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_app
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  minio:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: Vinayak@0987654321
    bucket-name: my-basket

logging:
    level:
      org.springframework.security: DEBUG
      org.springframework.web: DEBUG
jwt:
  secret: my-super-secret-key-my-super-secret-key-123456
  access-token-expiration: 900000 #15 min in ms
  refresh-token-expiration: 604800000 #5 days
  issuer: vinayak-app